in_source: '(defun fib (x y state) (if (< 4000000 y) 0 (if (= state 1) (+ y (fib y
  (+ x y) 2)) (if (= state 0) (fib y (+ x y) 1) (fib y (+ x y) 0)))))

  (print (fib 1 1 0))'
